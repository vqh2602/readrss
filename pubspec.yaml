name: readrss
description: "Modern Flutter web RSS reader with backup, sync link, notifications and live refresh."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.1
  html: ^0.15.6
  http: ^1.5.0
  intl: ^0.20.2
  shelf: ^1.4.2
  shelf_cors_headers: ^0.1.5
  shelf_proxy: ^1.0.4
  shelf_router: ^1.1.4
  shared_preferences: ^2.5.3
  web: ^1.1.1
  xml: ^6.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
